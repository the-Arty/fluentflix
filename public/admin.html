<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Admin - FluentFlix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        .sidebar { width: 250px; background: #2A3F54; color: white; position: fixed; height: 100%; top: 0; left: 0; padding-top: 30px;}
        .sidebar h2 { text-align: center; color: #00E5FF; margin-bottom: 40px;}
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px 25px; transition: 0.3s;}
        .sidebar a:hover { background: #1ABB9C; }
        .main { margin-left: 250px; padding: 30px 50px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        .grid-stats { display: flex; gap: 20px; margin-bottom: 30px;}
        .stat-box { background: white; padding: 25px; border-radius: 8px; flex: 1; border-left: 5px solid #1ABB9C; box-shadow: 0 5px 10px rgba(0,0,0,0.05);}
        .stat-box h3 { margin: 0; color: #73879C; font-size: 14px; text-transform: uppercase;}
        .stat-box p { margin: 10px 0 0 0; font-size: 32px; font-weight: bold; color: #2A3F54;}
        
        /* Formulario */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #333; font-weight: bold;}
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { background: #1ABB9C; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        button:hover { background: #14957c; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="#stats">Visão Geral</a>
        <a href="#add">Adicionar Aula</a>
        <a href="#users">Alunos</a>
        <a href="/">Ir para o Site <br><small>(Modo Aluno)</small></a>
    </div>

    <div class="main">
        <div class="grid-stats" id="stats">
            <div class="stat-box">
                <h3>Total de Usuários</h3>
                <p id="countUsers">Carregando...</p>
            </div>
            <div class="stat-box" style="border-color: #3498DB;">
                <h3>Vídeos Publicados</h3>
                <p id="countCourses">Carregando...</p>
            </div>
        </div>

        <!-- Formulario -->
        <div class="card" id="add">
            <h2>Publicar Novo Curso/Vídeo</h2>
            <p style="color:#73879C">Adicione uma aula diretamente à plataforma principal sem usar código.</p>
            
            <form id="addCourseForm">
                <div class="form-group">
                    <label>Título da Aula</label>
                    <input type="text" id="iptTitle" required placeholder="Ex: Entrevista Avançada">
                </div>
                <div class="form-group">
                    <label>Categoria (Módulo)</label>
                    <select id="iptCategory">
                        <option value="business">Business English</option>
                        <option value="conversational">Conversational English</option>
                        <option value="prep">TOEFL/IELTS Prep</option>
                        <option value="continue">Geral / Em Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nível</label>
                    <input type="text" id="iptLevel" required placeholder="Básico, Intermediário, Avançado">
                </div>
                <div class="form-group">
                    <label>Duração (Texto)</label>
                    <input type="text" id="iptDuration" required placeholder="Ex: 45 min">
                </div>
                <div class="form-group">
                    <label>ID do Vídeo no YouTube</label>
                    <input type="text" id="iptYoutube" required placeholder="Código do Youtube (Sht-UhhZ4)">
                </div>
                <div class="form-group">
                    <label>URL da Imagem de Capa (Thumbnail)</label>
                    <input type="text" id="iptThumb" required placeholder="https://...">
                </div>
                
                <button type="submit">Cadastrar e Publicar Agora</button>
            </form>
        </div>
    </div>

    <script>
        // Fetch Dashboard Stats
        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('countUsers').innerText = data.users;
                document.getElementById('countCourses').innerText = data.courses;
            });

        // Form Submit
        document.getElementById('addCourseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const payload = {
                title: document.getElementById('iptTitle').value,
                category: document.getElementById('iptCategory').value,
                level: document.getElementById('iptLevel').value,
                duration: document.getElementById('iptDuration').value,
                youtubeId: document.getElementById('iptYoutube').value,
                imgUrl: document.getElementById('iptThumb').value
            };

            fetch('/api/admin/cursos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(resp => {
                alert(resp.status); // Success notification
                this.reset();
            })
            .catch(err => alert("Erro ao enviar! " + err));
        });
    </script>
</body>
</html>
