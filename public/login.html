<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FluentFlix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0F1C;
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(180deg, rgba(10,15,28,0.7) 0%, rgba(10,15,28,1) 100%), url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: rgba(24, 31, 48, 0.95);
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(124, 77, 255, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .logo .highlight {
            color: #00E5FF;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #00E5FF;
        }

        .btn-login {
            background: #00E5FF;
            color: #0A0F1C;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background-color: white;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 40px 20px;
                width: 90%;
                border-radius: 8px;
            }
            .logo {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1 class="logo">Fluent<span class="highlight">Flix</span></h1>
        <h3 id="formTitle" style="margin-bottom: 20px; font-weight: 500;">Entrar</h3>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group" id="nameGroup" style="display: none;">
                <input type="text" id="name" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <input type="email" id="email" required placeholder="E-mail de acesso">
            </div>
            <div class="form-group">
                <input type="password" id="password" required placeholder="Senha">
            </div>
            <button type="submit" class="btn-login" id="submitBtn">Entrar</button>
            
            <p style="margin-top: 20px; font-size: 14px; color: rgba(255, 255, 255, 0.7);">
                <span id="toggleText">Ainda não tem conta?</span> 
                <a href="#" onclick="toggleMode(event)" id="toggleLink" style="color: #00E5FF; text-decoration: none; font-weight: 600;">Criar agora</a>
            </p>
        </form>
    </div>

    <script>
        let isLoginMode = true;

        // Se já estiver logado, redireciona instantaneamente
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            if (currentUser.email === 'admin@fluentflix.com') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        function toggleMode(e) {
            if(e) e.preventDefault();
            isLoginMode = !isLoginMode;
            
            const formTitle = document.getElementById('formTitle');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const submitBtn = document.getElementById('submitBtn');
            const nameGroup = document.getElementById('nameGroup');
            const nameInput = document.getElementById('name');

            if (isLoginMode) {
                formTitle.innerText = "Entrar";
                toggleText.innerText = "Ainda não tem conta?";
                toggleLink.innerText = "Criar agora";
                submitBtn.innerText = "Entrar";
                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
            } else {
                formTitle.innerText = "Criar Conta";
                toggleText.innerText = "Já possui uma conta?";
                toggleLink.innerText = "Fazer login";
                submitBtn.innerText = "Cadastrar";
                nameGroup.style.display = 'block';
                nameInput.setAttribute('required', 'true');
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();

            // Regra Estrita do Admin
            if (email === 'admin@fluentflix.com') {
                if (password === 'admin123') {
                    localStorage.setItem('currentUser', JSON.stringify({ name: 'Admin', email: email, role: 'admin' }));
                    window.location.href = 'admin.html';
                } else {
                    alert('Senha de administrador incorreta.');
                }
                return;
            }

            // BD local do navegador em Vercel
            let users = JSON.parse(localStorage.getItem('fluentflix_users')) || [];

            if (isLoginMode) {
                // LOGAR
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify({ name: user.name, email: user.email, role: 'student' }));
                    window.location.href = 'index.html';
                } else {
                    alert('E-mail ou senha inválidos no cadastro local.');
                }
            } else {
                // REGISTRAR
                const userExists = users.find(u => u.email === email);
                if (userExists) {
                    alert('Este e-mail já está em uso!');
                    return;
                }
                
                const newUser = { name, email, password };
                users.push(newUser);
                localStorage.setItem('fluentflix_users', JSON.stringify(users));
                
                // Entrar automaticamente após criar a conta
                localStorage.setItem('currentUser', JSON.stringify({ name: newUser.name, email: newUser.email, role: 'student' }));
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
