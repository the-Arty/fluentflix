<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FluentFlix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0F1C;
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(180deg, rgba(10,15,28,0.7) 0%, rgba(10,15,28,1) 100%), url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: rgba(24, 31, 48, 0.95);
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(124, 77, 255, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .logo .highlight {
            color: #00E5FF;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #00E5FF;
        }

        .btn-login {
            background: #00E5FF;
            color: #0A0F1C;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background-color: white;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 40px 20px;
                width: 90%;
                border-radius: 8px;
            }
            .logo {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1 class="logo">Fluent<span class="highlight">Flix</span></h1>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="email" id="email" required placeholder="E-mail de acesso">
            </div>
            <div class="form-group">
                <input type="password" id="password" required placeholder="Senha">
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Simulação de check auth antes de estarmos com endpoints hardcore
            // Caso seja email "admin@fluentflix.com" a gente manda p admin senao pra home do aluno.
            const email = document.getElementById('email').value;
            if(email === 'admin@fluentflix.com') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
